<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUPO 2026 | Research Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --brand-blue: #3C73B8;
            --brand-green: #6AAF5E;
            --brand-lightblue: #28AAE1;
            --brand-red: #D93626;

            --bg-soft: #f4f8fc;
            --bg-panel: #ffffff;
            --text-dark: #1f2d3d;
            --text-muted: #5f6c7b;
            --border-soft: rgba(60, 115, 184, 0.12);
            --shadow-soft: 0 16px 40px rgba(60, 115, 184, 0.10);
        }
        
        body { 
            background: linear-gradient(180deg, #f4f8fc 0%, #eef6fb 100%);
            color: var(--text-dark); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            padding: 28px 20px 40px; 
            text-align: center;
            min-height: 100vh;
        }

        .page-wrap {
            max-width: 1280px;
            margin: 0 auto;
        }

        h1 { 
            margin: 8px 0 10px; 
            font-weight: 800; 
            letter-spacing: -1px; 
            color: var(--text-dark);
            font-size: clamp(2rem, 4vw, 3.1rem);
            line-height: 1.05;
        }
        
        p.subtitle {
            opacity: 1;
            margin: 0 auto 30px;
            font-size: 1.08rem;
            color: var(--text-muted);
            max-width: 720px;
            line-height: 1.5;
        }

        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 0 auto 28px;
            flex-wrap: wrap;
            max-width: 900px;
        }

        .stat-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-soft);
            border-radius: 22px;
            padding: 22px 28px;
            min-width: 240px;
            box-shadow: var(--shadow-soft);
        }

        .num { 
            font-size: 3rem; 
            font-weight: 800; 
            color: var(--brand-green); 
            display: block; 
            line-height: 1;
            margin-bottom: 8px;
        }

        .label { 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 1.8px; 
            color: var(--text-dark); 
            opacity: 0.8;
            display: block;
        }

        .btn-container {
            margin: 10px 0 30px;
        }

        .register-btn {
            display: inline-block;
            background: var(--brand-blue);
            color: white;
            padding: 15px 34px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            transition: all 0.25s ease;
            box-shadow: 0 10px 24px rgba(60, 115, 184, 0.20);
        }

        .register-btn:hover { 
            background: var(--brand-lightblue);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(40, 170, 225, 0.25);
        }

        .map-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-soft);
            border-radius: 28px;
            padding: 14px;
            box-shadow: 0 20px 50px rgba(35, 31, 32, 0.10);
        }

        #map { 
            height: 680px; 
            width: 100%; 
            border-radius: 20px; 
            background: #eef6fb;
        }

        .ping-marker {
            background: var(--brand-lightblue);
            border: 2px solid white;
            border-radius: 50%;
            animation: pulse-brand 2.4s infinite;
            box-shadow: 0 2px 8px rgba(35, 31, 32, 0.18);
        }

        @keyframes pulse-brand {
            0% { box-shadow: 0 0 0 0 rgba(40, 170, 225, 0.40); }
            70% { box-shadow: 0 0 0 12px rgba(40, 170, 225, 0); }
            100% { box-shadow: 0 0 0 0 rgba(40, 170, 225, 0); }
        }

        .leaflet-tooltip { 
            background: white !important; 
            color: var(--text-dark) !important; 
            border: 1px solid rgba(60, 115, 184, 0.25) !important; 
            border-radius: 12px; 
            padding: 10px 12px; 
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(35, 31, 32, 0.12);
        }

        .leaflet-control-attribution { 
            background: rgba(255, 255, 255, 0.88) !important; 
            color: #666 !important; 
            border-radius: 10px 0 0 0;
            backdrop-filter: blur(4px);
        }

        .leaflet-container {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }



        .coverage-panel {
            margin: 18px auto 0;
            background: var(--bg-panel);
            border: 1px solid var(--border-soft);
            border-radius: 18px;
            padding: 18px 20px;
            box-shadow: var(--shadow-soft);
            text-align: left;
            display: none;
        }

        .coverage-panel h2 {
            margin: 0 0 8px;
            font-size: 1rem;
            color: var(--brand-blue);
        }

        .coverage-panel p {
            margin: 0 0 12px;
            color: var(--text-muted);
            line-height: 1.45;
        }

        .coverage-list {
            margin: 0;
            padding-left: 20px;
            columns: 2;
            column-gap: 30px;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .coverage-ok {
            border-color: rgba(106, 175, 94, 0.35);
        }

        .coverage-warning {
            border-color: rgba(217, 54, 38, 0.28);
        }

        @media (max-width: 900px) {
            #map {
                height: 560px;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 20px 14px 28px;
            }

            .stat-card {
                min-width: unset;
                width: 100%;
            }

            .num {
                font-size: 2.5rem;
            }

            #map {
                height: 480px;
            }

            .register-btn {
                width: 100%;
                max-width: 320px;
            }

            .coverage-list {
                columns: 1;
            }
        }
    </style>
</head>

        function toTitleCase(str) {
            return str
                .toLowerCase()
                .replace(/\b\w/g, char => char.toUpperCase());
        }

        function normalizeCity(city, country = '') {

            const countryNormalized = (country || '').trim().toLowerCase();

            if (aliasMap[city]) return aliasMap[city];

            if (/^.+,\s*Tokyo$/i.test(city)) return 'Tokyo';
            if (/^.+,\s*Kyoto$/i.test(city)) return 'Kyoto';
            if (/^.+,\s*Chiba$/i.test(city)) return 'Funabashi';
            if (/^.+,\s*Shizuoka$/i.test(city)) return 'Hamamatsu';
            if (/^.+,\s*Kanagawa$/i.test(city)) return 'Yokohama';
            if (/^.+,\s*Victoria$/i.test(city) && countryNormalized === 'australia') return 'Melbourne';
            if (/^.+,\s*Gyeonggi-do$/i.test(city)) return 'Ansan';
            if (/^.+,\s*Santiago$/i.test(city)) return 'Santiago';
            if (/^.+,\s*Chih\.$/i.test(city)) return 'Chihuahua';

            const titleCased = toTitleCase(city);

            if (aliasMap[titleCased]) return aliasMap[titleCased];

            return titleCased;
        }

        async function loadData() {
            try {
                const res = await fetch(csvUrl);
                if (!res.ok) throw new Error('Could not fetch CSV');
                
                const csv = await res.text();
                const lines = csv.split(/\r?\n/).filter(line => line.trim() !== '');
                const dataRows = lines.slice(1);
                
                const countries = new Set();
                const processedCities = new Set();
                const missingCities = new Map();
                let submissions = 0;

                dataRows.forEach(line => {
                    const cols = line
                        .split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                        .map(c => c.trim().replace(/^"|"$/g, ''));

                    let city = cols[0] || '';
                    const country = cols[1] || '';

                    if (!city && !country) return;
                    
                    submissions++;
                    if (country) countries.add(country);

                    const originalCity = city.trim();
                    city = normalizeCity(city, country);

                    if (hubs[city] && !processedCities.has(city)) {
                        const icon = L.divIcon({
                            className: 'ping-marker',
                            iconSize: [12, 12]
                        });

                        L.marker(hubs[city], { icon }).addTo(map)
                            .bindTooltip(`${city}, ${country}`, {
                                direction: 'top',
                                offset: [0, -8]
                            });

                        processedCities.add(city);
                    } else if (!hubs[city]) {
                        const key = `${city}|${country}`;
                        if (!missingCities.has(key)) {
                            missingCities.set(key, {
                                city,
                                country,
                                originalCity,
                                count: 0
                            });
                        }
                        missingCities.get(key).count++;
                    }
                });

                document.getElementById('count-abstracts').innerText = submissions.toLocaleString();
                document.getElementById('count-nations').innerText = countries.size;
                document.getElementById('count-cities').innerText = processedCities.size;

                updateCoveragePanel(missingCities, processedCities.size);

            } catch (e) { 
                console.error('Error loading CSV data:', e); 
                const panel = document.getElementById('coverage-panel');
                panel.style.display = 'block';
                panel.className = 'coverage-panel coverage-warning';
                document.getElementById('coverage-title').innerText = 'CSV Loading Error';
                document.getElementById('coverage-summary').innerText = 'The Google Sheet could not be loaded. Please check that the published CSV link is accessible.';
            }
        }

        function updateCoveragePanel(missingCities, mappedCount) {
            const panel = document.getElementById('coverage-panel');
            const title = document.getElementById('coverage-title');
            const summary = document.getElementById('coverage-summary');
            const list = document.getElementById('coverage-list');

            panel.style.display = 'block';
            list.innerHTML = '';

            if (missingCities.size === 0) {
                panel.className = 'coverage-panel coverage-ok';
                title.innerText = 'Coordinate Coverage Complete';
                summary.innerText = `All Google Sheet cities currently have coordinates in the code. ${mappedCount} unique cities are mapped.`;
                return;
            }

            panel.className = 'coverage-panel coverage-warning';
            title.innerText = 'Cities Missing Coordinates';
            summary.innerText = `${missingCities.size} city/country combination(s) from the Google Sheet are missing coordinates in the hubs list. Add these to the hubs object or alias them in normalizeCity().`;

            [...missingCities.values()]
                .sort((a, b) => a.city.localeCompare(b.city))
                .forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = `${item.city}${item.country ? ', ' + item.country : ''} (${item.count})`;
                    list.appendChild(li);
                });

            console.warn('Cities missing coordinates:', [...missingCities.values()]);
            console.info('Suggested hubs entries to complete manually:');
            [...missingCities.values()]
                .sort((a, b) => a.city.localeCompare(b.city))
                .forEach(item => console.info(`'${item.city}': [LATITUDE, LONGITUDE], // ${item.country || 'Country not provided'}`));
        }        
        loadData();
